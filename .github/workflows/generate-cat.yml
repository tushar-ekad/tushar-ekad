name: Generate Manga Cats

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  generate-cats:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Output Folder
        run: mkdir -p output

      - name: Generate Cat SVGs
        run: python scripts/generate_cat_svgs.py

      - name: Show Generated Files
        run: ls -la output

      - name: Commit SVG Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/*.svg

          git diff --staged --quiet || git commit -m "Update manga cats"

          git push
