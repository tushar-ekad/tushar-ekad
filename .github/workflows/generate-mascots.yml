name: Generate Manga Mascots

on:
  push:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Generate SVG Mascots
        run: python scripts/generate_mascots.py

      - name: Commit SVGs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add output/*.svg
          git commit -m "Update manga mascots" || echo "No changes"
          git push
