<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">

<style>
    .float {
        animation: float 2s ease-in-out infinite;
        transform-origin: center;
    }

    .legs {
        animation: swing 0.8s ease-in-out infinite alternate;
        transform-origin: top center;
    }

    .blink {
        animation: blink 4s infinite;
    }

    @keyframes swing {
        from { transform: rotate(-4deg); }
        to { transform: rotate(4deg); }
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
        100% { transform: translateY(0px); }
    }

    @keyframes blink {
        0%, 95%, 100% { opacity: 1; }
        97% { opacity: 0; }
    }
</style>

<g class="float">

    <!-- head -->
    <circle cx="70" cy="45" r="28" fill="#111" />

    <!-- hoodie -->
    <rect x="45" y="70" width="50" height="40" rx="10" fill="#222" />

    <!-- eyes -->
    <text x="53" y="50" font-size="12" fill="white" class="blink">ಠ ಠ</text>

    <!-- legs -->
    <g class="legs">
        <line x1="58" y1="110" x2="52" y2="128" stroke="#111" stroke-width="5" />
        <line x1="82" y1="110" x2="88" y2="128" stroke="#111" stroke-width="5" />
    </g>

    <!-- floor line -->
    <line x1="20" y1="130" x2="120" y2="130" stroke="#444" stroke-width="2" />

</g>
</svg>
