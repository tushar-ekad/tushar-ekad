
<svg width="180" height="180"
viewBox="0 0 180 180"
xmlns="http://www.w3.org/2000/svg">

<style>

.bg {
    animation: float 3s ease-in-out infinite;
}

.tail {
    transform-origin: 115px 105px;
    animation: tail 1.2s ease-in-out infinite alternate;
}

.blink {
    animation: blink 4s infinite;
}

.legs {
    transform-origin: top center;
    animation: swing 0.8s ease-in-out infinite alternate;
}

@keyframes tail {
    from { transform: rotate(-8deg); }
    to { transform: rotate(8deg); }
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
    100% { transform: translateY(0px); }
}

@keyframes blink {
    0%,95%,100% { opacity:1; }
    97% { opacity:0; }
}

@keyframes swing {
    from { transform: rotate(-4deg); }
    to { transform: rotate(4deg); }
}

text {
    font-family: monospace;
}

</style>

<g class="bg">

<!-- floor -->
<line x1="20" y1="150" x2="160" y2="150"
stroke="#777"
stroke-width="2"/>

<!-- tail -->
<path class="tail"
d="M110 105 Q145 85 130 60"
stroke="#8a8a8a"
stroke-width="8"
fill="none"
stroke-linecap="round"/>

<!-- body -->
<ellipse cx="80" cy="105"
rx="34"
ry="40"
fill="#8c8c8c"/>

<!-- head -->
<circle cx="70" cy="65"
r="30"
fill="#9a9a9a"/>

<!-- ears -->
<polygon points="48,42 58,20 66,45"
fill="#8a8a8a"/>

<polygon points="74,45 82,20 92,42"
fill="#8a8a8a"/>

<!-- eyes -->
<text x="54"
y="70"
font-size="12"
fill="#111"
class="blink">● ●</text>

<!-- paws -->
<g class="legs">

<ellipse cx="62"
cy="138"
rx="10"
ry="6"
fill="#777"/>

<ellipse cx="88"
cy="138"
rx="10"
ry="6"
fill="#777"/>

</g>

<!-- speech bubble -->
<ellipse cx="132"
cy="42"
rx="28"
ry="18"
fill="#fff"/>

<text x="118"
y="47"
font-size="12"
fill="#111">...</text>



</g>

</svg>
